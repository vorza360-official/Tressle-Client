name: Develop Build

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Also updated to v4 for consistency
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Run Tests
        run: flutter test
      
      - name: Build Debug APK
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4  # CHANGED: v3 → v4
        with:
          name: develop-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk