name: Main Release Build

on:
  push:
    branches: [ "main" ]

jobs:
  release-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      
      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEY_STORE_FILE }}" | base64 -d > android/app/key.jks
          chmod 600 android/app/key.jks
      
      - name: Debug - Check files
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Android Directory ==="
          ls -la android/
          echo "=== Android App Directory ==="
          ls -la android/app/
          echo "=== Key.properties content ==="
          cat android/key.properties || echo "key.properties not found"
          echo "=== Keystore file ==="
          ls -la android/app/key.jks || echo "key.jks not found"
      
      - name: Install Dependencies
        run: flutter pub get
      
      # - name: Run Tests
      #   run: flutter test
      
      - name: Build Release App Bundle
        run: flutter build appbundle --release
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: build/app/outputs/bundle/release/app-release.aab
      
      - name: Build Release APK (optional)
        run: flutter build apk --release
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk