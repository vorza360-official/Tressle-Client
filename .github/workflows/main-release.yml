name: Main Release Build

on:
  push:
    branches: [ "main" ]

jobs:
  release-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      # ===== SIGNING SETUP =====
      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEY_STORE_FILE }}" | base64 -d > android/app/key.jks
          chmod 600 android/app/key.jks
      
      # ===== VERSIONING =====
      # - name: Update version in pubspec.yaml
      #   run: |
      #     # Using GitHub run_number as build number
      #     sed -i "s/version: .*/version: 1.0.0+${{ github.run_number }}/" pubspec.yaml
      #     echo "✅ Updated version to 1.0.0+${{ github.run_number }}"
      
      - name: Install Dependencies
        run: flutter pub get
      
      # ===== BUILD =====
      - name: Build Release App Bundle
        run: flutter build appbundle --release
      
      # ===== PLAY STORE UPLOAD =====
      - name: Upload to Google Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.vorza360.tressle_client  # Your package name
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal  # This goes to your internal/closed testing track
          status: completed
          # Optional: Add release notes
          # whatsNewDirectory: distribution/whatsnew
      
      # ===== OPTIONAL: Also save APK as artifact =====
      - name: Build Release APK (Optional)
        run: flutter build apk --release
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk